<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Akithma ✨</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;

    background:
    radial-gradient(circle at top,#1e3a8a,#0f172a,#020617);

    color:white;
}

/* Stars */

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%,100%{
        opacity:0.2;
    }

    50%{
        opacity:1;
    }
}

/* Floating particles */

.particle{

    position:absolute;

    width:4px;
    height:4px;

    background:#60a5fa;

    border-radius:50%;

    box-shadow:0 0 10px #60a5fa;

    animation:floatUp linear infinite;
}

@keyframes floatUp{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Card */

.card{

    position:relative;

    z-index:10;

    width:90%;
    max-width:700px;

    text-align:center;

    padding:50px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:30px;

    animation:fadeIn 2s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{

    font-size:3rem;
    margin-bottom:20px;

    text-shadow:0 0 20px rgba(255,255,255,0.3);
}

.line{

    font-size:1.3rem;

    margin-bottom:15px;

    opacity:0;

    animation:showLine 1s forwards;
}

.line:nth-child(2){
    animation-delay:1s;
}

.line:nth-child(3){
    animation-delay:2s;
}

.line:nth-child(4){
    animation-delay:3s;
}

@keyframes showLine{

    to{
        opacity:1;
    }
}

button{

    margin-top:35px;

    background:#2563eb;

    color:white;

    border:none;

    padding:16px 38px;

    border-radius:50px;

    font-size:18px;

    cursor:pointer;

    transition:0.4s;
}

button:hover{

    transform:translateY(-4px) scale(1.05);

    box-shadow:
    0 0 20px #3b82f6,
    0 0 40px #2563eb;
}

button:active{
    transform:scale(0.95);
}

.fadeOut{

    animation:pageFade 1.5s forwards;
}

@keyframes pageFade{

    to{
        opacity:0;
        transform:scale(1.1);
    }
}

</style>
</head>

<body>

<div class="card" id="card">

    <h1>Hey Akithma ✨</h1>

    <div class="line">
        Before I ask you anything...
    </div>

    <div class="line">
        I hope today gave you at least one reason to smile.
    </div>

    <div class="line">
        How was your day today? 💙
    </div>

    <button onclick="nextPage()">
        It was a good day 💙
    </button>

</div>

<script>

/* Stars */

for(let i=0;i<150;i++){

    let star=document.createElement("div");

    star.classList.add("star");

    let size=Math.random()*3+1;

    star.style.width=size+"px";
    star.style.height=size+"px";

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    star.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(star);
}

/* Particles */

for(let i=0;i<35;i++){

    let particle=document.createElement("div");

    particle.classList.add("particle");

    particle.style.left=Math.random()*100+"vw";

    particle.style.animationDuration=
    (10+Math.random()*10)+"s";

    particle.style.animationDelay=
    Math.random()*10+"s";

    document.body.appendChild(particle);
}

/* Page Transition */

function nextPage(){

    document.getElementById("card")
    .classList.add("fadeOut");

    setTimeout(()=>{

        window.location.href="memory.html";

    },1200);
}

</script>

</body>
</html>
