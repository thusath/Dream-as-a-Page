<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Akithma ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    max-width:700px;
    padding:30px;
}

h1{
    font-size:3rem;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}

.yes{
    background:#ff4081;
    color:white;
}

.think{
    background:white;
    color:#ff4081;
}

#result{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Hi Akithma ❤️</h1>

<p>
Every conversation with you makes my day brighter.
You're kind, beautiful, and someone I genuinely enjoy being around.
</p>

<h2>Would you like to start a relationship with me? 💖</h2>

<button class="yes" onclick="yesAnswer()">Yes ❤️</button>
<button class="think" onclick="thinkAnswer()">Let Me Think 😊</button>

<div id="result"></div>

</div>

<script>
function yesAnswer(){
    document.getElementById("result").innerHTML =
    "You just made me the happiest person alive ❤️";
}

function thinkAnswer(){
    document.getElementById("result").innerHTML =
    "That's okay. Take all the time you need 😊";
}
</script>

</body>
</html>
