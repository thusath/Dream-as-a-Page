<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Question ❤️</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            color: white;
            transition: background 3s ease;
        }

        /* Stars & Particles */
        .star { position: absolute; width: 1px; height: 1px; background: white; border-radius: 50%; animation: twinkle 4s infinite, drift 30s linear infinite; }
        @keyframes twinkle { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-120px); } }

        /* Main Card */
        .card {
            position: relative; z-index: 10; width: 92%; max-width: 850px; padding: 30px 20px;
            text-align: center; background: rgba(255, 255, 255, .05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, .1); border-radius: 20px; transition: opacity 1s ease;
        }

        h1 { font-size: 2rem; margin-bottom: 20px; }
        p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 15px; color: #e2e8f0; }

        .buttons { margin-top: 30px; }
        button {
            padding: 12px 25px; font-size: 16px; border-radius: 40px; margin: 8px;
            border: none; cursor: pointer; transition: .4s;
        }
        .yes { background: #ef4444; color: white; }
        .yes:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 25px #ef4444; }
        .think { background: white; color: #0f172a; }
        .think:hover { transform: translateY(-3px) scale(1.05); }

        /* Cinematic Elements */
        #replyBtn { display: none; padding: 15px 35px; border-radius: 50px; background: #25D366; color: white; font-size: 18px; cursor: pointer; transition: .3s; border: none; margin-top: 20px; }
        #replyBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px #25D366; }

        .risingHeart { position: fixed; bottom: -50px; pointer-events: none; z-index: 9998; animation: heartRise 8s linear forwards; }
        @keyframes heartRise { 0% { transform: translateY(0) scale(.5); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } }

        .rose { position: fixed; top: -50px; pointer-events: none; z-index: 9997; animation: roseFall 10s linear forwards; }
        @keyframes roseFall { 0% { transform: translateY(-50px) rotate(0deg); } 100% { transform: translateY(120vh) rotate(720deg); } }

        #bigHeart { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 180px; opacity: 0; z-index: 9996; transition: 3s; filter: drop-shadow(0 0 40px red); }
        #finalMessage { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; text-align: center; z-index: 9999; transition: 4s; }

        @media (max-width: 600px) { h1 { font-size: 1.5rem; } #bigHeart { font-size: 120px; } }
    </style>
</head>
<body>

<audio id="music" src="music.mp3" preload="auto"></audio>

<div class="card" id="mainCard">
    <h1>Hi Akithma ❤️</h1>
    <p>Every day I find myself smiling because of you.</p>
    <p>You are someone truly special to me.</p>
    <p>Would you like to start this journey together?</p>
    <div class="buttons">
        <button class="yes" onclick="yesAnswer()">Yes ❤️</button>
        <button class="think" onclick="thinkAnswer()">Let Me Think 😊</button>
    </div>
    <p id="result" style="margin-top:20px;"></p>
</div>

<div id="finalMessage">
    <h1>Akithma ❤️</h1>
    <p>You just made me the happiest person alive ❤️<br>Thank you for giving us a chance.</p>
    <button onclick="sendWhatsApp()" id="replyBtn">Message Me ❤️</button>
</div>

<div id="bigHeart">❤️</div>

<script>
    // Create Background Stars
    for(let i=0; i<150; i++){
        let star = document.createElement("div"); 
        star.className = "star";
        star.style.left = Math.random() * 100 + "vw"; 
        star.style.top = Math.random() * 100 + "vh";
        star.style.animationDelay = Math.random() * 5 + "s"; 
        document.body.appendChild(star);
    }

    function yesAnswer(){
        // Try playing music
        let audio = document.getElementById("music");
        audio.play().catch(e => console.log("User interaction required for audio."));

        document.getElementById("mainCard").style.opacity = "0";
        document.body.style.background = "#000";

        // Hearts Animation
        for(let i=0; i<60; i++){
            setTimeout(() => {
                let heart = document.createElement("div"); 
                heart.innerHTML = "❤️"; 
                heart.className = "risingHeart";
                heart.style.left = Math.random() * 100 + "vw"; 
                heart.style.fontSize = (20 + Math.random() * 30) + "px";
                document.body.appendChild(heart);
            }, i * 100);
        }

        // Roses Animation
        for(let i=0; i<20; i++){
            setTimeout(() => {
                let flower = document.createElement("div"); 
                flower.innerHTML = "🌹"; 
                flower.className = "rose";
                flower.style.left = Math.random() * 100 + "vw"; 
                document.body.appendChild(flower);
            }, i * 300);
        }

        setTimeout(() => { 
            document.getElementById("bigHeart").style.opacity = "1";
            document.getElementById("bigHeart").style.transform = "translate(-50%,-50%) scale(1)";
        }, 2500);

        setTimeout(() => { 
            document.getElementById("finalMessage").style.opacity = "1";
            document.getElementById("replyBtn").style.display = "inline-block";
        }, 4000);
    }

    function thinkAnswer(){
        document.getElementById("result").innerHTML = "That's completely okay 😊 Take all the time you need.";
    }

    function sendWhatsApp(){
        window.open("https://wa.me/94775916435?text=Hi%20Thusath%20❤️%20My%20answer%20is%20YES!", "_blank");
    }
</script>

</body>
</html>
