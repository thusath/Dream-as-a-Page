<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Question ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            color: white;
        }

        /* Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite, drift 30s linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .2; }
            50% { opacity: 1; }
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(-120px); }
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #60a5fa;
            border-radius: 50%;
            box-shadow: 0 0 15px #60a5fa;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 0; }
            20% { opacity: 1; }
            to { transform: translateY(-120vh); opacity: 0; }
        }

        /* Main Card */
        .card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 850px;
            padding: 60px;
            text-align: center;
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 30px;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 3rem; margin-bottom: 25px; }
        p { font-size: 1.3rem; line-height: 2; margin-bottom: 15px; color: #e2e8f0; }

        .buttons { margin-top: 30px; }
        button { padding: 16px 40px; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; margin: 10px; transition: .4s; }
        .yes { background: #ef4444; color: white; }
        .yes:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 25px #ef4444, 0 0 50px #ef4444; }
        .think { background: white; color: #0f172a; }
        .think:hover { transform: translateY(-3px) scale(1.05); }

        /* Animations for Yes Action */
        .risingHeart { position: fixed; bottom: -50px; pointer-events: none; z-index: 9998; animation: heartRise 8s linear forwards; }
        @keyframes heartRise {
            0% { transform: translateY(0) scale(.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        .rose { position: fixed; top: -50px; pointer-events: none; z-index: 9997; animation: roseFall 10s linear forwards; }
        @keyframes roseFall {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(120vh) rotate(720deg); }
        }

        .sparkle { position: fixed; pointer-events: none; z-index: 9999; animation: sparkleAnim 2s forwards; }
        @keyframes sparkleAnim {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(2); }
            100% { opacity: 0; transform: scale(0); }
        }

        #bigHeart {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 180px;
            opacity: 0;
            z-index: 9996;
            transition: 3s;
            filter: drop-shadow(0 0 40px red);
        }

        #finalMessage {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            text-align: center;
            z-index: 9999;
            transition: 4s;
            color: white;
        }
    </style>
</head>
<body>

<audio id="music">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card" id="mainCard">
    <h1>Hi Akithma ❤️</h1>
    <p>Every day I find myself smiling because of you.</p>
    <p>You are someone truly special to me.</p>
    <p>Would you like to start this journey together?</p>
    <div class="buttons">
        <button class="yes" onclick="yesAnswer()">Yes ❤️</button>
        <button class="think" onclick="thinkAnswer()">Let Me Think 😊</button>
    </div>
    <div id="result"></div>
</div>

<div id="finalMessage">
    <h1>Akithma ❤️</h1>
    <p>You just made me the happiest person alive.</p>
</div>

<div id="bigHeart">❤️</div>

<script>
    /* Background Elements Initialization */
    for(let i=0;i<180;i++){
        let star=document.createElement("div");
        star.classList.add("star");
        star.style.left=Math.random()*100+"vw";
        star.style.top=Math.random()*100+"vh";
        star.style.animationDelay=Math.random()*5+"s";
        document.body.appendChild(star);
    }

    for(let i=0;i<35;i++){
        let particle=document.createElement("div");
        particle.classList.add("particle");
        particle.style.left=Math.random()*100+"vw";
        particle.style.animationDuration=(12+Math.random()*10)+"s";
        particle.style.animationDelay=Math.random()*10+"s";
        document.body.appendChild(particle);
    }

    /* YES BUTTON */
    function yesAnswer(){
        try{ document.getElementById("music").play(); } catch(e){}

        /* Hide proposal card */
        document.getElementById("mainCard").style.opacity="0";

        /* Fade to black */
        document.body.style.transition="3s";
        document.body.style.background="#000";

        /* Hearts Rising */
        for(let i=0;i<2500;i++){
            setTimeout(()=>{
                let heart=document.createElement("div");
                heart.innerHTML="❤️";
                heart.className="risingHeart";
                heart.style.left=Math.random()*100+"vw";
                heart.style.fontSize=(15+Math.random()*40)+"px";
                document.body.appendChild(heart);
            },i*4);
        }

        /* Rose Petals */
        for(let i=0;i<400;i++){
            setTimeout(()=>{
                let flower=document.createElement("div");
                flower.innerHTML="🌹";
                flower.className="rose";
                flower.style.left=Math.random()*100+"vw";
                flower.style.fontSize=(20+Math.random()*30)+"px";
                document.body.appendChild(flower);
            },i*30);
        }

        /* Sparkles */
        for(let i=0;i<500;i++){
            setTimeout(()=>{
                let sparkle=document.createElement("div");
                sparkle.innerHTML="✨";
                sparkle.className="sparkle";
                sparkle.style.left=Math.random()*100+"vw";
                sparkle.style.top=Math.random()*100+"vh";
                document.body.appendChild(sparkle);
            },i*15);
        }

        /* Big Heart */
        setTimeout(()=>{
            document.getElementById("bigHeart").style.opacity="1";
            document.getElementById("bigHeart").style.transform="translate(-50%,-50%) scale(1)";
        },2500);

        /* Show final message */
        setTimeout(()=>{
            document.getElementById("finalMessage").style.opacity="1";
        },4000);
    }

    /* THINK BUTTON */
    function thinkAnswer(){
        document.getElementById("result").innerHTML="That's completely okay 😊 Take all the time you need.";
    }
</script>

</body>
</html>
