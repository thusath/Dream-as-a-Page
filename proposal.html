<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Question ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; /* allow scrolling on small screens */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            color: white;
        }

        /* Stars - Optimized */
        .star {
            position: absolute;
            width: 1px;
            height: 1px;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite, drift 30s linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .2; }
            50% { opacity: 1; }
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(-120px); }
        }

        /* Particles - Optimized */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #60a5fa;
            border-radius: 50%;
            box-shadow: 0 0 15px #60a5fa;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 0; }
            20% { opacity: 1; }
            to { transform: translateY(-120vh); opacity: 0; }
        }

        /* Main Card - Mobile Optimized */
        .card {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 850px;
            padding: 25px 18px;
            text-align: center;
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 20px;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 10px;
            color: #e2e8f0;
        }

        .buttons { margin-top: 30px; }
        
        button {
            padding: 12px 22px;
            font-size: 16px;
            border-radius: 40px;
            margin: 8px;
            border: none;
            cursor: pointer;
            transition: .4s;
        }
        
        .yes { background: #ef4444; color: white; }
        .yes:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 25px #ef4444, 0 0 50px #ef4444; }
        .think { background: white; color: #0f172a; }
        .think:hover { transform: translateY(-3px) scale(1.05); }

        /* Reply Button Style */
        #replyBtn {
            display: none;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: #25D366;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: .3s;
        }
        #replyBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #25D366;
        }

        /* Animations for Yes Action */
        .risingHeart { position: fixed; bottom: -50px; pointer-events: none; z-index: 9998; animation: heartRise 8s linear forwards; }
        @keyframes heartRise {
            0% { transform: translateY(0) scale(.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        .rose { position: fixed; top: -50px; pointer-events: none; z-index: 9997; animation: roseFall 10s linear forwards; }
        @keyframes roseFall {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(120vh) rotate(720deg); }
        }

        .sparkle { position: fixed; pointer-events: none; z-index: 9999; animation: sparkleAnim 2s forwards; }
        @keyframes sparkleAnim {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(2); }
            100% { opacity: 0; transform: scale(0); }
        }

        #bigHeart {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 180px;
            opacity: 0;
            z-index: 9996;
            transition: 3s;
            filter: drop-shadow(0 0 40px red);
        }

        #finalMessage {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            text-align: center;
            z-index: 9999;
            transition: 4s;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,0,0,0.6);
        }

        /* FULL Mobile Optimization */
        @media (max-width: 600px) {
            .card {
                padding: 18px 14px;
                border-radius: 16px;
            }
            h1 {
                font-size: 1.5rem;
            }
            p {
                font-size: 0.95rem;
                line-height: 1.5;
            }
            button {
                width: 100%;
                max-width: 260px;
                font-size: 15px;
            }
            .buttons {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            #bigHeart {
                font-size: 120px;
            }
        }
    </style>
</head>
<body>

<audio id="music">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card" id="mainCard">
    <h1>Hi Akithma ❤️</h1>
    <p>Every day I find myself smiling because of you.</p>
    <p>You are someone truly special to me.</p>
    <p>Would you like to start this journey together?</p>
    <div class="buttons">
        <button class="yes" onclick="yesAnswer()">Yes ❤️</button>
        <button class="think" onclick="thinkAnswer()">Let Me Think 😊</button>
    </div>
    <div id="result"></div>
</div>

<div id="finalMessage">
    <h1>Akithma ❤️</h1>
    <p>
        You just made me the happiest person alive ❤️
        <br><br>
        Thank you for giving us a chance.
    </p>
    <br>
    <button onclick="sendWhatsApp()" id="replyBtn">
        Message Me ❤️
    </button>
</div>

<div id="bigHeart">❤️</div>

<script>
    /* Background Elements Initialization */
    for(let i=0;i<180;i++){
        let star=document.createElement("div");
        star.classList.add("star");
        star.style.left=Math.random()*100+"vw";
        star.style.top=Math.random()*100+"vh";
        star.style.animationDelay=Math.random()*5+"s";
        document.body.appendChild(star);
    }

    for(let i=0;i<35;i++){
        let particle=document.createElement("div");
        particle.classList.add("particle");
        particle.style.left=Math.random()*100+"vw";
        particle.style.animationDuration=(12+Math.random()*10)+"s";
        particle.style.animationDelay=Math.random()*10+"s";
        document.body.appendChild(particle);
    }

    /* YES BUTTON */
    function yesAnswer(){
        try{ document.getElementById("music").play(); } catch(e){}

        document.getElementById("mainCard").style.opacity="0";
        document.body.style.transition="3s";
        document.body.style.background="#000";

        for(let i=0;i<500;i++){
            setTimeout(()=>{
                let heart=document.createElement("div");
                heart.innerHTML="❤️";
                heart.className="risingHeart";
                heart.style.left=Math.random()*100+"vw";
                heart.style.fontSize=(15+Math.random()*40)+"px";
                document.body.appendChild(heart);
            },i*4);
        }

        for(let i=0;i<80;i++){
            setTimeout(()=>{
                let flower=document.createElement("div");
                flower.innerHTML="🌹";
                flower.className="rose";
                flower.style.left=Math.random()*100+"vw";
                flower.style.fontSize=(20+Math.random()*30)+"px";
                document.body.appendChild(flower);
            },i*30);
        }

        for(let i=0;i<120;i++){
            setTimeout(()=>{
                let sparkle=document.createElement("div");
                sparkle.innerHTML="✨";
                sparkle.className="sparkle";
                sparkle.style.left=Math.random()*100+"vw";
                sparkle.style.top=Math.random()*100+"vh";
                document.body.appendChild(sparkle);
            },i*15);
        }

        setTimeout(()=>{
            document.getElementById("bigHeart").style.opacity="1";
            document.getElementById("bigHeart").style.transform="translate(-50%,-50%) scale(1)";
        },2500);

        setTimeout(()=>{
            document.getElementById("bigHeart").style.opacity="0";
            document.getElementById("bigHeart").style.transform="translate(-50%,-50%) scale(1.5)";
        },6000);

        setTimeout(()=>{
            document.getElementById("finalMessage").style.opacity="1";
        },4000);

        setTimeout(()=>{
            document.getElementById("replyBtn").style.display="inline-block";
        },6000);
    }

    function thinkAnswer(){
        document.getElementById("result").innerHTML="That's completely okay 😊 Take all the time you need.";
    }

    function sendWhatsApp(){
        window.open(
            "https://wa.me/94775916435?text=Hi%20Thusath%20❤️%20My%20answer%20is%20YES!",
            "_blank"
        );
    }
</script>

</body>
</html>
